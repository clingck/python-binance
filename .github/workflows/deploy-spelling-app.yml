name: Deploy Spell the Animals app

# Publishes the kids' spelling game to GitHub Pages so it can be opened
# as a normal web link on a phone or tablet (where JavaScript runs).
on:
  push:
    branches:
      - master
      - claude/animal-spelling-app-6ijwb2
    paths:
      - "animal-spelling-app/**"
      - ".github/workflows/deploy-spelling-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload the app folder as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./animal-spelling-app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
